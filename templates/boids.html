<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Boids Simulation Framework</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #ffffff; }
        .canvas-container { display: flex; justify-content: center; margin-top: 20px; }
        canvas { background-color: #ffffff; border: 2px solid #333; border-radius: 4px; }
        .control-panel { background-color: #1e1e1e; border-radius: 6px; padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <div class="container-fluid px-4 my-4">
        <h2 class="text-center">Boids Flocking Optimization Engine</h2>
        <p class="text-muted text-center">Interactive 2D vector kinematics rendered via Web Canvas</p>

        <div class="row align-items-start">
            <div class="col-lg-9 col-md-8 canvas-container">
                <canvas id="boidsCanvas" width="800" height="800"></canvas>
            </div>
            
            <div class="col-lg-3 col-md-4">
                <div class="control-panel">
                    <h4>Simulation Vectors</h4>
                    <hr style="border-color: #444;">
                    
                    <div class="mb-3">
                        <label class="form-label">Boid Population: <span id="boidCountVal">40</span></label>
                        <input type="range" class="form-range" id="boidCountSlider" min="5" max="150" step="1" value="40">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Cohesion Strength: <span id="cohesionVal">0.134</span></label>
                        <input type="range" class="form-range" id="cohesionSlider" min="0" max="0.2" step="0.001" value="0.134">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Separation Strength: <span id="separationVal">0.045</span></label>
                        <input type="range" class="form-range" id="separationSlider" min="0" max="0.5" step="0.001" value="0.045">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Alignment Strength: <span id="alignmentVal">0.038</span></label>
                        <input type="range" class="form-range" id="alignmentSlider" min="0" max="0.2" step="0.001" value="0.038">
                    </div>

                    <div class="form-check form-switch mb-4">
                        <input class="form-check-input" type="checkbox" id="toggleCenters" checked>
                        <label class="form-check-label" for="toggleCenters">Show Average Position Circles</label>
                    </div>

                    <button class="btn btn-primary w-100 mt-2" id="runBtn">Reset Swarm Array</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("boidsCanvas");
        const ctx = canvas.getContext("2d");
        const toggleCentersCheckbox = document.getElementById("toggleCenters");
        
        const MAP_SIZE = 25.0; 

        let animationFrames = [];
        let animationIntervalId = null;
        let isFetching = false;

        function updateSliderLabels() {
            document.getElementById("boidCountVal").innerText = document.getElementById("boidCountSlider").value;
            document.getElementById("cohesionVal").innerText = document.getElementById("cohesionSlider").value;
            document.getElementById("separationVal").innerText = document.getElementById("separationSlider").value;
            document.getElementById("alignmentVal").innerText = document.getElementById("alignmentSlider").value;
        }

        async function fetchSimulation(isReset = false) {
            // Prevent multiple concurrent background calls
            if (isFetching && !isReset) return; 
            isFetching = true;

            updateSliderLabels();
            
            const payload = {
                boid_count: parseInt(document.getElementById("boidCountSlider").value),
                cohesion: parseFloat(document.getElementById("cohesionSlider").value),
                separation: parseFloat(document.getElementById("separationSlider").value),
                alignment: parseFloat(document.getElementById("alignmentSlider").value),
                reset: isReset
            };

            try {
                const response = await fetch("/api/boids/simulate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if (data.status === "success") {
                    if (isReset) {
                        // Wipe old frames entirely if the user explicitly hits "Reset"
                        animationFrames = data.frames;
                        startPlayback();
                    } else {
                        // Append next calculated frame sequence smoothly to the back of the queue
                        animationFrames = animationFrames.concat(data.frames);
                    }
                } else {
                    console.error("Backend Simulation Error:", data.error);
                }
            } catch (err) {
                console.error("Network or API communication failed:", err);
            } finally {
                isFetching = false;
            }
        }

        function drawTriangle(x, y, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(10, 0);
            ctx.lineTo(-10, -6);
            ctx.lineTo(-10, 6);
            ctx.closePath();
            ctx.fill();
            
            ctx.restore();
        }

        function drawGroupCenter(x, y) {
            ctx.beginPath();
            ctx.arc(x, y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = "rgba(0, 0, 255, 0.6)";
            ctx.fill();
        }

        function playFrame() {
            if (animationFrames.length === 0) return;
            
            // Consume the first item out of our frame buffer queue
            const currentFrame = animationFrames.shift();
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Render blue group background circles
            if (toggleCentersCheckbox.checked) {
                currentFrame.centers.forEach(center => {
                    const webX = (center.x / MAP_SIZE) * canvas.width;
                    const webY = (1.0 - center.y / MAP_SIZE) * canvas.height;
                    drawGroupCenter(webX, webY);
                });
            }

            // Render boid triangles
            currentFrame.boids.forEach(boid => {
                const webX = (boid.x / MAP_SIZE) * canvas.width;
                const webY = (1.0 - boid.y / MAP_SIZE) * canvas.height; 
                const color = boid.in_group ? "red" : "black";
                drawTriangle(webX, webY, -boid.angle, color);
            });

            // If the buffer queue is getting running low, fetch the next sequence in the background
            if (animationFrames.length < 150) {
                fetchSimulation(false);
            }
        }

        function startPlayback() {
            if (animationIntervalId) clearInterval(animationIntervalId);
            animationIntervalId = setInterval(playFrame, 20);
        }

        // Action binding updates
        document.getElementById("runBtn").addEventListener("click", () => fetchSimulation(true));
        document.querySelectorAll(".form-range").forEach(el => el.addEventListener("input", updateSliderLabels));
        
        window.onload = () => fetchSimulation(true);
    </script>
</body>
</html>
